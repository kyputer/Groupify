name: CI

on:
  pull_request:
  push:
    branches:
      - nextjs
      - master
      - main
      - 'codex/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify on Linux
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.3
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: groupify
          MYSQL_USER: groupify
          MYSQL_PASSWORD: groupify
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mariadb-admin ping -h 127.0.0.1 -uroot -prootpassword"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: groupify

    env:
      NODE_ENV: test
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: groupify
      DB_PASSWORD: groupify
      DB_NAME: groupify
      DB_SSL: 'false'
      SESSION_SECRET: ci-session-secret
      SPOTIFY_CLIENT_ID: ci-spotify-client-id
      SPOTIFY_CLIENT_SECRET: ci-spotify-client-secret
      SPOTIFY_REDIRECT_URI: http://localhost:3000/api/callback

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: groupify/.nvmrc
          cache: npm
          cache-dependency-path: groupify/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
